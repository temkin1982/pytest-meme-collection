[pytest]

addopts =
    -v
    -s
    --maxfail=50
    --tb=short
    --headed
    --slowmo=5000


testpaths = test_practise tests
python_files = test_*.py

markers =
    param: parametrize validation tests
    smoke: critical tests
    regression: full testing

filterwarnings = ignore::pytest.PytestUnknownMarkWarning
